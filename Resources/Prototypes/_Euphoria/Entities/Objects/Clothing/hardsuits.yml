#The suits try to be a 1 to 1 statwise to the orginal suits of each command in terms of stats and abilites, if ya want to port this rember to adjsut the values

#Head of Security's Hardsuit
- type: entity
  parent: [ClothingOuterHardsuitBase, BaseCommandContraband]
  id: ClothingOuterHardsuitMagicalHOS
  name: Wings of the law wand
  description: Feel the righteous power of the magical girl with the power of the law on your side, just hold this wand close to your heart.
  components:
  - type: Sprite
    sprite: _Euphoria/Clothing/OuterClothing/Hardsuits/security-magical.rsi
  - type: Clothing
    sprite: _Euphoria/Clothing/OuterClothing/Hardsuits/security-magical.rsi
    equipSound: /Audio/_Euphoria/Magic/magical-transformation4.ogg
    unequipSound: /Audio/_Euphoria/Magic/magical-transformation2.ogg
  - type: PressureProtection
    highPressureMultiplier: 0.45
    lowPressureMultiplier: 1000
  - type: ExplosionResistance
    damageCoefficient: 0.5
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.6
        Slash: 0.5
        Piercing: 0.5
        Heat: 0.8
        Radiation: 0.5
        Caustic: 0.6
  - type: DamageOnShootProtection # imp
    slots: OUTERCLOTHING
    damageProtection:
      flatReductions:
        Blunt: 10
  - type: StaminaResistance # DeltaV
    damageCoefficient: 0.3
  - type: ClothingSpeedModifier
    walkModifier: 0.8
    sprintModifier: 0.8
  - type: ToggleableClothing
    clothingPrototype: ClothingOuterHardsuitMagicalHOSTiara
  - type: Item
    size: Large
  - type: Tag
    tags:
    - Hardsuit
    - WhitelistChameleon

