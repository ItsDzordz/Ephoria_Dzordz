#QM Hardsuit
- type: entity
  parent: [ClothingOuterHardsuitBase, BaseCommandContraband, BaseJetpack]
  id: ClothingOuterHardsuitMagicalQM
  name: Black credit card
  description: No limit, no problem, keep money close to your heart.
  components:
  - type: Sprite
    sprite: _Euphoria/Clothing/OuterClothing/Hardsuits/qm-magical.rsi
  - type: Clothing
    sprite: _Euphoria/Clothing/OuterClothing/Hardsuits/qm-magical.rsi
    equipSound: /Audio/_Euphoria/Magic/magical-transformation4.ogg
    unequipSound: /Audio/_Euphoria/Magic/magical-transformation2.ogg
  - type: PressureProtection
    highPressureMultiplier: 0.45
    lowPressureMultiplier: 1000
  - type: ExplosionResistance
    damageCoefficient: 0.5
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.7
        Slash: 0.5
        Piercing: 0.7
        Heat: 0.6
        Radiation: 0.3
        Caustic: 0.7
