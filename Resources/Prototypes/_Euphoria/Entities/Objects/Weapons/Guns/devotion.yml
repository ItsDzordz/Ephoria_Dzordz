- type: entity
  name: FL-06 Devotion
  parent: BaseWeaponRifle
  id: WeaponRifleDevotion
  description: A high end military grade assault rifle. Uses .20 rifle ammo.
  components:
  - type: Sprite
    sprite: _Euphoria/Objects/Weapons/Guns/Rifles/devotion.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Euphoria/Objects/Weapons/Guns/Rifles/devotion.rsi
  - type: Gun
    fireRate: 7
    soundGunshot:
      path: /Audio/_Euphoria/Weapons/Guns/Devotion/shoot.ogg
      params:
        volume: 5
    fireOnDropChance: 0.2
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineLaser
        insertSound: /Audio/_Euphoria/Weapons/Guns/Devotion/mag_out.ogg #/Audio/_Euphoria/Weapons/Guns/Devotion/mag_in.ogg
        ejectSound: /Audio/_Euphoria/Weapons/Guns/Devotion/mag_out.ogg
        priority: 2
        whitelist:
          tags:
          - MagazineLaser
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: CartridgeLaser
        priority: 1
        whitelist:
          tags:
          - CartridgeLaser
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/_Euphoria/Weapons/Guns/Devotion/cock.ogg
  - type: GunRequiresWield

