- type: entity
  parent: VendingMachine
  id: VendingMachineFreelancerPMCGun
  name: Freelancer Gun-Vend
  description: Pinickle of firearms fallen to the public domain, now right at your fingertips.
  components:
  - type: VendingMachine
    pack: VMFreelancerInventoryGun
    offState: off
    brokenState: broken
    normalState: normal-unshaded
    ejectState: eject-unshaded
    denyState: deny-unshaded
  - type: Sprite
    noRot: true
    sprite: _Floof/Structures/Machines/VendingMachines/freelancervend.rsi
    layers:
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.Base"]
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.BaseUnshaded"]
      shader: unshaded
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: PointLight
    radius: 2
    energy: 1.3
    color: "#ffb0b0"
    mask: /Textures/Effects/LightMasks/cone.png
    autoRot: true
  - type: AccessReader
    access: [["Freelancer"]]
  - type: Transform
    noRot: false
  - type: Rotatable
    rotateWhileAnchored: false

